name: anjo-traders CI (Feature Branch)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  FRONTEND_IMAGE: harbor.lab/anjo-traders/frontend
  BACKEND_IMAGE: harbor.lab/anjo-traders/backend
  SONAR_URL: http://192.168.1.130:9000

jobs:
  build-frontend:
    runs-on: host
    steps:
      - uses: actions/checkout@v4
      - name: Harbor login
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.lab \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
      - name: Build frontend (no push)
        run: |
          docker build \
            --build-arg VITE_API_URL=https://anjo-traders.vienstereoptic.com/api \
            -t ${{ env.FRONTEND_IMAGE }}:pr-${{ github.sha }} \
            frontend/
          echo "[OK] Frontend build OK -- not pushed (feature branch)"

  build-backend:
    runs-on: host
    steps:
      - uses: actions/checkout@v4
      - name: Harbor login
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.lab \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
      - name: Build backend (no push)
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:pr-${{ github.sha }} \
            backend/
          echo "[OK] Backend build OK -- not pushed (feature branch)"

  sonarqube-scan:
    runs-on: host
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run SonarQube scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="${{ env.SONAR_URL }}" \
            -e SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=anjo-traders \
            -Dsonar.sources=. \
            -Dsonar.exclusions="**/node_modules/**,**/__pycache__/**,**/migrations/**,**/static/**,**/media/**,**/*.min.js,**/dist/**,**/build/**,**/k8s/**,**/Dockerfile*,**/*.dockerfile" \
            -Dsonar.python.version=3
          echo "[OK] SonarQube scan complete"
